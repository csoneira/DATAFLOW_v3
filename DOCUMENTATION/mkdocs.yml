site_name: DATAFLOW_v3 Documentation
site_url: https://csoneira.github.io/DATAFLOW_v3/
repo_name: csoneira/DATAFLOW_v3
repo_url: https://github.com/csoneira/DATAFLOW_v3

nav:
  - Overview:
      - Home: index.md
      - Getting Started: getting-started/index.md
      - Reader Guide: getting-started/reader-guide.md
  - Project Dossier:
      - project/index.md
      - Scientific Case: project/scientific-case.md
      - Work Packages: project/work-packages.md
      - Governance and Sites: project/governance-and-sites.md
      - Milestones, Deliverables, and Risk: project/milestones-deliverables-risk.md
  - Collaborators:
      - collaborators/index.md
  - Software:
      - software/index.md
      - 5-Minute System Model: software/system-model.md
      - Software Invariants: software/invariants.md
      - Analysis (Software): software/operational-pipeline.md
      - Simulation (Digital Twin): software/simulation-pipeline.md
      - Dictionary-Based Inference: software/inference-and-dictionary.md
      - Real Data Trace: software/trace-real-data.md
      - Simulated Data Trace: software/trace-simulated-data.md
      - Change Impact Matrix: software/change-impact-matrix.md
      - Architecture Overview: software/architecture.md
      - Code Structure Reference: software/code-structure.md
  - Hardware:
      - hardware/index.md
      - Detector Stations: hardware/detector-stations.md
      - DAQ and Infrastructure: hardware/daq-and-infrastructure.md
      - Maintenance and Calibration: hardware/maintenance.md
  - Operational Notes:
      - operations/index.md
      - Pipelines and Dataflow: operations/pipelines-and-dataflow.md
      - Cron, Locks, and Maintenance: operations/cron-and-maintenance.md
  - Troubleshooting and FAQs:
      - troubleshooting/index.md
      - Common Issues: troubleshooting/common-issues.md
      - FAQ: troubleshooting/faq.md
  - Conventions and Standards:
      - standards/index.md
      - Conventions and Governance: standards/conventions-and-governance.md
      - Determinism and Provenance: standards/determinism-and-provenance.md
      - Documentation Lifecycle: standards/documentation-lifecycle.md
      - Documentation Quality Checklist: standards/documentation-quality-checklist.md
      - Script Header Standard: standards/script-header-standard.md
  - Publications and References:
      - references/index.md
      - Publications and Reports: references/publications-and-reports.md
      - Repository Source Documents: references/source-documents.md
      - Figure Gallery and Provenance: references/figure-gallery.md
  - Appendices:
      - appendices/index.md
      - Data Dictionaries: appendices/data-dictionaries.md
      - Contracts and Interfaces: appendices/contracts-and-interfaces.md
      - Glossary: appendices/glossary.md
      - Contact List: appendices/contact-list.md
  - Legacy miniTRASGO Pages:
      - legacy/index.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
  logo: assets/logo_mingo_network.png
  favicon: assets/logo_mingo_network.png
  palette:
    - scheme: default
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - assets/js/mermaid-init.js

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

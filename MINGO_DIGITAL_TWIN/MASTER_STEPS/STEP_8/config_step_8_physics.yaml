# Fixed


# Semifixed
t_fee_sigma_ns: 0.030
# 60 fC under the inverse TOT calibration is about 0.13792 ns.
charge_threshold: 0.13792
charge_conversion_model: tot_curve_inverse
tot_to_charge_calibration_path: MASTER/CONFIG_FILES/STAGE_1/EVENT_DATA/STEP_1/TASK_2/TOT_TO_CHARGE_CAL/tot_to_charge_calibration.csv
# Fallback only if the TOT calibration file is unavailable.
# Slope from linear regression of Width[ns] vs Fast_Charge[fC].
q_to_time_factor: 0.1468290836084766
qfront_offsets:
  - [85, 87, 89, 91]
  - [86, 88, 90, 92]
  - [87, 89, 91, 93]
  - [88, 90, 92, 94]
qback_offsets:
  - [86, 88, 90, 92]
  - [87, 89, 91, 93]
  - [88, 90, 92, 94]
  - [89, 91, 93, 95]

# Variable (to loop on)
step_8_id: "001"

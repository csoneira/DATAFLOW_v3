# Step 1
## Angular distribution
cos_n: [2, 2]
## Flux
flux_cm2_min: [1.15, 1.8]

# Append strategy:
# - uniform_random: existing behavior
# - regular_mesh: build a regular grid around random center values
mode: uniform_random

# Used only when mode=regular_mesh.
# Example below creates a mesh in flux and identical efficiencies.
regular_mesh_parameters: [flux_cm2_min, efficiencies]
regular_mesh_points: 5
# Half-width of the grid as a fraction of each parameter range (capped internally
# to keep exactly regular_mesh_points values per parameter).
regular_mesh_relative_span: 0.5

# Step 3
## Efficiencies
efficiencies: [0.6, 1]
efficiencies_identical: false
# Used only when efficiencies_identical=false.
# Maximum allowed difference between the lowest and highest plane efficiency
# around a sampled base efficiency (default legacy behavior is 0.10).
# Example tunings:
# - 0.8  -> allows up to 0.8 spread
# - null -> disable spread cap; each plane is sampled in full [min,max]
efficiencies_max_spread: 0.2

# Optional: generate multiple rows per run, sharing selected columns.
repeat_samples: 1
shared_columns: [cos_n, flux_cm2_min]  # keep empty to avoid forcing repeated flux/cos across a batch
expand_z_positions: true  # one sampled geometry per new line

# Optional fixed detector geometry override for STEP_0.
# Use one 4-value list for a single geometry, or a list of 4-value lists for several.
z_positions_override_mm: [0, 65, 130, 195]

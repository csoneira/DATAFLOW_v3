# Main simulation cycle frequency control.
#
# Cron still triggers run_main_simulation_cycle.sh every minute, but the script
# enforces this minimum interval between cycle starts.
# - 0  => disable gate (continuous mode, every cron tick)
# - 60 => run at most once per minute
# - 180 => run at most once every 3 minutes
SIM_MAIN_CYCLE_MIN_INTERVAL_SECONDS=180

# Optional: custom state file path for last gate pass.
# SIM_MAIN_CYCLE_LAST_RUN_FILE="$HOME/DATAFLOW_v3/OPERATIONS_RUNTIME/LOCKS/cron/sim_main_pipeline.last_run_epoch"

# Optional: bypass gate for a manual run.
# SIM_MAIN_CYCLE_IGNORE_FREQUENCY_GATE=1

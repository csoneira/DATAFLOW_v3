# STEP_0 enqueue frequency gate.
#
# Cron triggers run_main_simulation_cycle.sh every minute. The script keeps
# enqueue and processing in separate locks, and this gate applies only to
# enqueue attempts.
# - 0  => disable gate (enqueue every cron tick)
# - 60 => enqueue at most once per minute
# - 180 => enqueue at most once every 3 minutes
# Keep this non-zero to actively exercise the frequency gate logic while still
# allowing the minute cron schedule to pass under normal timing jitter.
SIM_MAIN_CYCLE_MIN_INTERVAL_SECONDS=30

# Optional: custom state file path for last gate pass.
# SIM_MAIN_CYCLE_LAST_RUN_FILE="$HOME/DATAFLOW_v3/OPERATIONS_RUNTIME/LOCKS/cron/sim_main_pipeline.last_run_epoch"

# Optional: bypass gate for a manual run.
# SIM_MAIN_CYCLE_IGNORE_FREQUENCY_GATE=1

# Backpressure gate for STEP 0 (new job creation).
#
# Before adding new simulation jobs (STEP 0), the pipeline counts the total
# number of .dat files that are pending in the downstream pipeline:
#   - Files in SIMULATED_DATA/*.dat and SIMULATED_DATA/FILES/*.dat
#     (produced, awaiting ingest)
#   - Files in TASK_*/INPUT_FILES/UNPROCESSED_DIRECTORY/  (queued for processing)
#   - Files in TASK_*/INPUT_FILES/PROCESSING_DIRECTORY/   (currently processing)
#
# If the total >= SIM_MAX_UNPROCESSED_FILES, STEP 0 is skipped for this cycle.
# - 0 => disabled (STEP 0 always runs regardless of downstream backlog)
SIM_MAX_UNPROCESSED_FILES=100

# Sanitize policy for run_main_simulation_cycle.sh
#
# There are two sanitize passes in processing:
# - pre-pass via run_step.sh (helps avoid scheduling on stale/broken SIM_RUN dirs)
# - post-pass after pruning/cleanup (housekeeping sweep)
#
# Pre-pass settings (forwarded to run_step.sh):
# SIM_RUN_STEP_AUTOCLEAN_CONFLICTS=1
# SIM_RUN_STEP_AUTOCLEAN_MIN_AGE_S=300
#
# Post-pass settings (run_main stage "sanitize"):
# SIM_POST_SANITIZE_ENABLED=1
# SIM_POST_SANITIZE_MIN_AGE_S=900
#
# STEP_FINAL ownership during processing:
# - 1 => run STEP_FINAL in processing phase (default)
# - 0 => skip processing STEP_FINAL (use standalone STEP_FINAL cron owner)
# SIM_PROCESSING_RUN_STEP_FINAL=1

# Structured logging (JSONL) for orchestration + STEP_FINAL:
# - 1 => enabled (writes to OPERATIONS_RUNTIME/CRON_LOGS/SIMULATION/STRUCTURED/)
# - 0 => disabled
# SIM_STRUCTURED_LOGS_ENABLED=1

# Persistent stuck-line/broken-run alerting policy (applies inside run_step.sh):
# - condition: stuck_step1_lines > 0 OR broken_runs > 0 in work_state.csv
# - min_cycles: consecutive observations before first alert
# - repeat_cycles: cooldown in observation cycles before re-alerting
# - min_observation_interval_s: minimum wall-time between observations
# Telegram delivery uses:
#   SIM_ALERT_TELEGRAM_BOT_TOKEN (optional override for token)
#   SIM_ALERT_TELEGRAM_CHAT_IDS (comma/space-separated chat ids) OR
#   OPERATIONS/NOTIFICATIONS/TELEGRAM_BOT/ALERT_CHAT_IDS.txt
# RUN_STEP_STUCK_ALERTS_ENABLED=1
# RUN_STEP_STUCK_ALERT_MIN_CYCLES=3
# RUN_STEP_STUCK_ALERT_REPEAT_CYCLES=60
# RUN_STEP_STUCK_ALERT_MIN_OBSERVATION_INTERVAL_S=45

last_file_test: true
selection:
  stations: [0, 1]
  date_ranges:
    - start: 2024-09-27
      end: 2024-10-01
complete_reanalysis: false
article_format: false
# create_plots options: null | debug | usual | essential | all
# Task 2 plot alias statuses live in config_plots_task_2.yaml
create_plots: null
keep_all_columns_output: false
filter_parameter_config_csv: config_filter_parameters_task_2.csv
# Optional filter-parameter overlay. Keep true to apply
# config_filter_parameters_task_2.csv bounds/thresholds.
use_filter_parameter_config: true
strip_pair_min_events: 10
track_removed_rows_task2: false
removed_marker: x
removed_marker_size: 10
removed_marker_alpha: 0.9
touched_marker: +
touched_marker_size: 24
touched_marker_alpha: 0.95
strip_pair_figsize: [7, 7]
limit_number: null
number_of_time_cal_figures: 3
calibrate_charge_ns_to_fc: true
validate_charge_pedestal_calibration: true
# Calibration modes: null (skip) | file (load from QA CSV) | make (compute fresh)
# Each key accepts either a scalar (all stations) or a per-station list
# [MINGO00, MINGO01, MINGO02, MINGO03, MINGO04]; missing entries default to "make".
# analysis_mode is a prime-product composite: cs×cfb×tc×tdc
# charge_side primes:       null=×1, file=×2,  make=×3
# charge_front_back primes: null=×1, file=×5,  make=×7
# time_calibration primes:  null=×1, file=×11, make=×13
# time_dif_calibration:     null=×1, file=×17, make=×19
charge_side: [make]
charge_front_back: [make]
time_calibration: [make]
time_dif_calibration: [make]
slewing_correction: false
time_window_filtering: false
charge_share_prefilter: false
calibration_dataframe_filtering: false
old_timing_method: true
# Calibration behaviour flags (moved here from config_parameters_task_2.csv)
validate_pos_cal: true
interpolate_fast_charge_log_scale: true
crosstalk_fitting: false
crosstalk_removal_and_recalibration: false

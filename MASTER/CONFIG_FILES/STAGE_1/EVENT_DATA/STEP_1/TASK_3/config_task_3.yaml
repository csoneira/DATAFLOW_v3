last_file_test: true
selection:
  stations: [0, 1]
  date_ranges:
    - start: 2024-09-27
      end: 2024-10-01
default_z_positions:
- 0
- 150
- 300
- 450
complete_reanalysis: false
stratos_save: false
# create_plots options: null | debug | usual | essential | all
# Task 3 plot statuses by alias live in config_plots_task_3.yaml
create_plots: null
filter_parameter_config_csv: config_filter_parameters_task_3.csv
# list_tt_qsum_pair_plot_mode options: hexbin | scatter
list_tt_qsum_pair_plot_mode: scatter
# Plot-only cap for the Task 3 list_tt Q_sum lower-triangular figure.
list_tt_qsum_pair_plot_charge_cap: null
# Threshold grid for charge-filtered diagnostics.
# mode: manual | auto (alias: quantile)
# auto mode builds thresholds from 0 to Q(quantile) using N linearly spaced steps.
list_tt_charge_threshold_mode: auto
list_tt_charge_threshold_auto_quantile: 95
list_tt_charge_threshold_auto_steps: 10
# Optional manual cap applied to threshold generation and charge-range plots.
# You can set a global value with list_tt_charge_limit, and/or station-specific overrides here.
list_tt_charge_limit_by_station:
  mingo00: 150
  mingo01: 150
# Charge asymmetry (Q_diff/Q_sum) x-axis controls:
# - Set charge_asymmetry_x_abs_max to force symmetric limits [-abs_max, +abs_max].
# - Keep null to use shared auto-limits from quantiles below.
charge_asymmetry_x_abs_max: null
charge_asymmetry_x_low_quantile: 0.5
charge_asymmetry_x_high_quantile: 99.5
# Manual fallback / optional explicit grid.
list_tt_charge_thresholds: [0, 5, 10, 20, 50]
limit_number: null
y_new_method: true

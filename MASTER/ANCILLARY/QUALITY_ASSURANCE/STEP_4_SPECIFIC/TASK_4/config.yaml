stations: [0, 1, 2, 3, 4]
task_id: 4
metadata_type: specific
metadata_csv_filename: task_4_metadata_specific.csv
column_patterns_file: task_4_specific_columns.txt
pass_default_value: 1.0
pass_column_name: task_4_specific_pass
column_patterns:
  - 'filename_base'
  - 'execution_timestamp'
  - 'param_hash'
  - 'count_rate_denominator_seconds'
  - 'analysis_mode'
  - 'unc_y'
  - 'unc_tsum'
  - 'unc_tdif'
  - 'z_P1'
  - 'z_P2'
  - 'z_P3'
  - 'z_P4'
  - 'sigmoid_*'
  - 'background_slope_*'
  - 'fit_normalization_*'
  - 'res_*_sigma'
  - 'ext_res_*_sigma'
plots:
  format: png
  dpi: 150
  line_width: 0.8
  marker_size: 1.8
  sigmoid_fit:
    enabled: true
    filename: sigmoid_fit_matrix
    families: ['12', '13', '14', '23', '24', '34', '123', '124', '134', '234', '1234']
    variables: ['sigmoid_width', 'background_slope', 'sigmoid_amplitude', 'sigmoid_center', 'fit_normalization']
  residuals:
    pairs:
      enabled: true
      filename: residuals_pairs
      families: ['12', '13', '14', '23', '24', '34']
      metrics: ['ystr', 'tsum', 'tdif']
    triples_quads:
      enabled: true
      filename: residuals_triples_quads
      families: ['123', '124', '134', '234', '1234']
      metrics: ['ystr', 'tsum', 'tdif']
    ext_triples_quads:
      enabled: true
      filename: ext_residuals_triples_quads
      families: ['123', '124', '134', '234', '1234']
      metrics: ['ystr', 'tsum', 'tdif']

stations: [0, 1, 2, 3, 4]
task_ids: [1, 2, 3, 4, 5]
metadata_suffix: rate_histogram
metadata_type: rate_histogram
pass_column_template: task_{task_id}_rate_histogram_pass
column_rule_table_csv: rate_histogram_column_rules.csv
column_patterns:
  - '*'

plots:
  ncols: 4
  dpi: 150
  format: png
  max_columns_per_group: 12
  plot_groups:
    - name: rate_histogram_summary
      columns:
        - events_per_second_total_seconds
        - count_rate_denominator_seconds
        - events_per_second_global_rate
    - name: events_per_second_bins
      columns:
        - events_per_second_*_rate_hz

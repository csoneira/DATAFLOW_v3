stations: [0, 1, 2, 3, 4]
task_ids: [1, 2, 3, 4, 5]
metadata_suffix: trigger_type
metadata_type: trigger_types
pass_column_template: task_{task_id}_trigger_types_pass
column_rule_table_csv: trigger_types_column_rules.csv
column_patterns:
  - '*'
allow_migration_matrix: true
plot_ignore_patterns_extra:
  - '*_total_offenders_*'
  - '*noise_count*'
  - '*_noise_*'
  - '*_to_*'

plots:
  ncols: 4
  dpi: 150
  format: png
  max_columns_per_group: 12
  plot_groups:
    - name: clean_vs_cal_rates
      overlay_columns:
        - clean_tt_*_rate_hz
        - cal_tt_*_rate_hz
      overlay_labels:
        - clean
        - cal
    - name: clean_to_cal_rates
      columns:
        - clean_to_cal_tt_*_rate_hz
    - name: clean_vs_cal_counts
      overlay_columns:
        - clean_tt_*_count
        - cal_tt_*_count
      overlay_labels:
        - clean
        - cal

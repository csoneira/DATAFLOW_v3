# TimTrack quality scan config (next long run).
# One full sweep: 100 cocut points x 5 min ~= 500 min (~8h20m), plus plotting overhead.

# Target station (MINGO00..MINGO04 -> 0..4)
station=0

# Wait between scan cycles (minutes)
interval_minutes=5

# Fixed convergence parameters (not scanned)
fixed_d0=10
fixed_iter_max=100

# cocut scan range (inclusive)
cocut_min=0.10
cocut_max=3.00
cocut_step=0.10

# Plot selection:
# 0 = latest run, 1 = previous run, ... ; -1 = disable run filter
plot_run_back=0

# Planned finite run behavior:
# Stop automatically after one full cocut sweep, then restore defaults.
stop_after_profile_sweep=true
restore_default_after_sweep=true

# Defaults to restore after the sweep completes.
default_d0=10
default_cocut=2.00
default_iter_max=100

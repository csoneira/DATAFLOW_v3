default:
  default_ncols: 4
  default_max_columns_per_plot: 8

special:
  - name: task1_pre_filters
    tasks: [1]
    mode: columns
    ncols: 3
    sharey: true
    ylim: [0, 100]
    columns:
      - data_purity_percentage
      - valid_lines_in_binary_file_percentage
      - clean_tt_lt_10_rows_removed_pct
      - channel_qt_mismatch_rows_removed_clean_tt_of_mismatch_pct
      - channel_qt_mismatch_rows_retained_final_of_mismatch_pct

  - name: task1_overall_impact
    tasks: [1]
    mode: columns
    ncols: 3
    sharey: true
    ylim: [0, 100]
    columns:
      - plane_combination_filter_rows_affected_pct
      - plane_combination_filter_values_zeroed_pct
      - plane_combination_filter_flagged_rows_pct
      - plane_combination_filter_selected_offender_channels_pct
      - plane_combination_filter_multi_offender_rows_pct

  - name: task1_scope_row_filters
    tasks: [1]
    mode: panels
    ncols: 4
    sharey: true
    ylim: [0, 100]
    series_labels: [overall, self, same_strip, same_plane, any]
    panels:
      - title: rows_flagged
        columns:
          - plane_combination_filter_flagged_rows_pct
          - plane_combination_filter_rows_with_self_relation_failures_pct
          - plane_combination_filter_rows_with_same_strip_relation_failures_pct
          - plane_combination_filter_rows_with_same_plane_relation_failures_pct
          - plane_combination_filter_rows_with_any_relation_failures_pct
      - title: q_sum_low
        columns:
          - plane_combination_filter_q_sum_low_rows_failed_pct
          - plane_combination_filter_self_q_sum_low_rows_failed_pct
          - plane_combination_filter_same_strip_q_sum_low_rows_failed_pct
          - plane_combination_filter_same_plane_q_sum_low_rows_failed_pct
          - plane_combination_filter_any_q_sum_low_rows_failed_pct
      - title: q_sum_high
        columns:
          - plane_combination_filter_q_sum_high_rows_failed_pct
          - plane_combination_filter_self_q_sum_high_rows_failed_pct
          - plane_combination_filter_same_strip_q_sum_high_rows_failed_pct
          - plane_combination_filter_same_plane_q_sum_high_rows_failed_pct
          - plane_combination_filter_any_q_sum_high_rows_failed_pct
      - title: q_dif
        columns:
          - plane_combination_filter_q_dif_rows_failed_pct
          - plane_combination_filter_self_q_dif_rows_failed_pct
          - plane_combination_filter_same_strip_q_dif_rows_failed_pct
          - plane_combination_filter_same_plane_q_dif_rows_failed_pct
          - plane_combination_filter_any_q_dif_rows_failed_pct
      - title: t_sum_low
        columns:
          - plane_combination_filter_t_sum_low_rows_failed_pct
          - plane_combination_filter_self_t_sum_low_rows_failed_pct
          - plane_combination_filter_same_strip_t_sum_low_rows_failed_pct
          - plane_combination_filter_same_plane_t_sum_low_rows_failed_pct
          - plane_combination_filter_any_t_sum_low_rows_failed_pct
      - title: t_sum_high
        columns:
          - plane_combination_filter_t_sum_high_rows_failed_pct
          - plane_combination_filter_self_t_sum_high_rows_failed_pct
          - plane_combination_filter_same_strip_t_sum_high_rows_failed_pct
          - plane_combination_filter_same_plane_t_sum_high_rows_failed_pct
          - plane_combination_filter_any_t_sum_high_rows_failed_pct
      - title: t_dif
        columns:
          - plane_combination_filter_t_dif_rows_failed_pct
          - plane_combination_filter_self_t_dif_rows_failed_pct
          - plane_combination_filter_same_strip_t_dif_rows_failed_pct
          - plane_combination_filter_same_plane_t_dif_rows_failed_pct
          - plane_combination_filter_any_t_dif_rows_failed_pct


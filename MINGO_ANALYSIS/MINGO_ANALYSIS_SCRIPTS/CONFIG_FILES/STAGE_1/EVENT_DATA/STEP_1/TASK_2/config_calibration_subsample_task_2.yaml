# Sole source of truth for hard filters applied to Task 2 calibration_df.
# A five-element list is resolved by station index: [MINGO00, ..., MINGO04].
# A strip contributes to cluster size exactly when its raw strip Q_sum is
# finite and non-zero. Zero remains the missing/rejected-strip sentinel.
# minimum_strip_charge_scope controls how the strip threshold is applied within
# each required plane. highest_active_strip preserves the former one-strip
# selection meaning when multi-strip clusters are admitted: at least one strip
# must exceed the threshold, without rejecting charge-sharing neighbours.

require_passes_task_1: true
trigger_type_column: tt_task1_clean
allowed_trigger_types: [1234, 123, 234, 124, 134]
allowed_plane_topologies: [1234, 123, 234, 124, 134]
allowed_cluster_sizes_present_planes: [1, 2, 3, 4]
# Active strips in every required plane must form one contiguous block.
allowed_active_strip_topologies:
  ["1000", "0100", "0010", "0001", "1100", "0110", "0011", "1110", "0111", "1111"]
require_zero_cluster_size_missing_planes: false
minimum_strip_charge_scope: highest_active_strip
# false preserves the former effective behavior explicitly: fit stages use the
# canonical calibration sample and their configured per-row validity gates,
# rather than requiring every fitted strip to be the plane's only active strip.
fit_requires_exactly_one_strip_per_plane: false

# Fit-row validity gates inside the already-selected calibration_df.
qfb_fit_require_nonzero_qdif: true
qtdif_fit_require_nonzero_tdif: true
qtdif_fit_require_nonzero_qdif: true

minimum_detector_charge: [100, 120, 120, 120, 120]
minimum_plane_charge: [70, 80, 80, 80, 80]
minimum_strip_charge: [75, 85, 85, 85, 85]

initial_raw_tsum_left: [-200, -130, -130, -200, -130]
initial_raw_tsum_right: [-90, -100, -100, -100, -100]

real_stage_filtering_enabled: true

post_tdif_filter_enabled: true
post_tdif_abs_max: 0.79
post_charge_side_qsum_filter_enabled: true
post_charge_side_qsum_left: [-10, -10, -10, -10, -10]
post_charge_side_qsum_right: [1000, 300, 300, 300, 300]
post_qfb_qtdif_qdif_filter_enabled: true
post_qfb_qtdif_qdif_abs_max: 2
post_charge_qsum_filter_enabled: true
post_charge_qsum_left: [-10, -10, -10, -10, -10]
post_charge_qsum_right: [1000, 300, 300, 300, 300]
post_tsum_filter_enabled: true
post_tsum_left: [-200, -130, -130, -200, -130]
post_tsum_right: [-90, -100, -100, -100, -100]
post_slewing_filter_enabled: true
post_slewing_tsum_left: [-200, -130, -130, -200, -130]
post_slewing_tsum_right: [-90, -100, -100, -100, -100]

selection:
  stations: [0, 1, 2, 3, 4]
  date_ranges:
    - start: 2024-09-27
      end: 2024-10-01

# Optional per-step overrides. A list, including an empty list, takes priority
# over the corresponding list in STEP_N/config_step_N.yaml. Use null to keep
# the local step policy active.
step_policies:
  step_1:
    stations: null
    reprocess_completed_stations: null
  step_2:
    stations: null
    reprocess_completed_stations: null

qa_retry:
  enabled: true
  source_csv: /home/mingo/DATAFLOW_v3/MINGO_ANALYSIS/MINGO_ANALYSIS_SCRIPTS/ANCILLARY/QUALITY_ASSURANCE_NEW/TOTAL_SUMMARY/OUTPUTS/FILES/qa_all_stations_reprocessing_quality.csv
  selectors:
    - id: all_quality_failures
      target_stations: [1, 2, 3, 4]
      qa_stations: [1, 2, 3, 4]
      quality_statuses: [fail]
      failed_columns_any:
        - '*'

reprocessing_run_matrix:
  enabled: true
  mode: whitelist
  default_steps: []
  stations:
    "0": [0, 1, 2]
    "1": [0, 1, 2]
    "2": [0, 1, 2]
    "3": [0, 1, 2]
    "4": [0, 1, 2]
